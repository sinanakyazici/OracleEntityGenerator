name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, and package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 preview
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore OracleEntityGenerator.slnx

      - name: Build
        run: dotnet build OracleEntityGenerator.slnx --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test OracleEntityGenerator.Tests/OracleEntityGenerator.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: OracleEntityGenerator.Tests/TestResults/*.trx
          if-no-files-found: ignore

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: OracleEntityGenerator.VSIX
          path: OracleEntityGenerator.VSIX/bin/Release/net472/OracleEntityGenerator.VSIX.vsix
          if-no-files-found: error
