name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Publish GitHub release
    runs-on: windows-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout CI commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download VSIX artifact from CI
        uses: actions/download-artifact@v5
        with:
          name: OracleEntityGenerator.VSIX
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VSIX version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content "OracleEntityGenerator.VSIX/source.extension.vsixmanifest"
          $version = $manifest.PackageManifest.Metadata.Identity.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VSIX version could not be read from source.extension.vsixmanifest."
          }

          "VSIX_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV
          "RELEASE_NAME=Oracle Entity Generator v$version" >> $env:GITHUB_ENV

      - name: Move version tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $env:RELEASE_TAG
          git push origin "refs/tags/$env:RELEASE_TAG" --force

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: artifacts/OracleEntityGenerator.VSIX.vsix
          generate_release_notes: true
          overwrite_files: true
