name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: windows-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout CI commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current ref
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v6

      - name: Setup .NET 10 preview
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore OracleEntityGenerator.VSIX/OracleEntityGenerator.VSIX.csproj

      - name: Build VSIX
        run: dotnet build OracleEntityGenerator.VSIX/OracleEntityGenerator.VSIX.csproj --configuration Release --no-restore -warnaserror

      - name: Read VSIX version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content "OracleEntityGenerator.VSIX/source.extension.vsixmanifest"
          $version = $manifest.PackageManifest.Metadata.Identity.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VSIX version could not be read from source.extension.vsixmanifest."
          }

          "VSIX_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV
          "RELEASE_NAME=Oracle Entity Generator v$version" >> $env:GITHUB_ENV

      - name: Move version tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $env:RELEASE_TAG
          git push origin "refs/tags/$env:RELEASE_TAG" --force

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: OracleEntityGenerator.VSIX/bin/Release/net472/OracleEntityGenerator.VSIX.vsix
          generate_release_notes: true
          overwrite_files: true
