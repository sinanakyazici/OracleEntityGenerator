name: Package VSIX Artifact

on:
  workflow_run:
    workflows:
      - Build and Test CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build VSIX package
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 preview
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore OracleEntityGenerator.VSIX/OracleEntityGenerator.VSIX.csproj

      - name: Build VSIX
        run: dotnet build OracleEntityGenerator.VSIX/OracleEntityGenerator.VSIX.csproj --configuration Release --no-restore -warnaserror

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: OracleEntityGenerator.VSIX
          path: OracleEntityGenerator.VSIX/bin/Release/net472/OracleEntityGenerator.VSIX.vsix
          if-no-files-found: error
