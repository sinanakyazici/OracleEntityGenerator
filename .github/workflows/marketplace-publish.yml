name: Publish

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish released VSIX
    runs-on: windows-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout release commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current ref
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v6

      - name: Read VSIX version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content "OracleEntityGenerator.VSIX/source.extension.vsixmanifest"
          $version = $manifest.PackageManifest.Metadata.Identity.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VSIX version could not be read from source.extension.vsixmanifest."
          }

          "VSIX_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV

      - name: Download VSIX from GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releaseUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG"
          $release = Invoke-RestMethod -Uri $releaseUrl -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -eq "OracleEntityGenerator.VSIX.vsix" } | Select-Object -First 1
          if ($null -eq $asset) {
            throw "Release asset OracleEntityGenerator.VSIX.vsix was not found on release $env:RELEASE_TAG."
          }

          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "artifacts/OracleEntityGenerator.VSIX.vsix"

      - name: Locate VsixPublisher
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VSSDK -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstallPath)) {
            throw "Visual Studio installation with VSSDK was not found on the runner."
          }

          $publisher = Join-Path $vsInstallPath "VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          if (-not (Test-Path $publisher)) {
            throw "VsixPublisher.exe was not found at $publisher."
          }

          "VSIX_PUBLISHER_EXE=$publisher" >> $env:GITHUB_ENV

      - name: Publish to Marketplace
        shell: pwsh
        env:
          VS_MARKETPLACE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VS_MARKETPLACE_PAT)) {
            throw "Missing VS_MARKETPLACE_PAT repository secret."
          }

          & "$env:VSIX_PUBLISHER_EXE" publish `
            -payload "artifacts/OracleEntityGenerator.VSIX.vsix" `
            -publishManifest ".marketplace/vsix-publish.json" `
            -personalAccessToken "$env:VS_MARKETPLACE_PAT"
