name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Oracle Entity Generator.
  - type: input
    id: version
    attributes:
      label: Version
      description: VSIX version or commit SHA.
      placeholder: "1.0.6"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Tools -> Oracle Entity Generator
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Visual Studio:
        Windows:
        Oracle Database:
        .NET SDK:
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove passwords, connection strings, and secrets before posting.
